      { word: "3d shapes", phonetic: "/ˈθriː diː ʃeɪps/", kr: "3차원 입체 도형", cn: "3D图形 (sān d tú xíng)", jp: "3D図形 (すりーでぃーずけい)", ex: "A ball and a box are <b>3d shapes</b>." },
      { word: "cube", phonetic: "/kjuːb/", kr: "정육면체", cn: "立方体 (lì fāng tǐ)", jp: "立方体 (りっぽうたい)", ex: "A dice is shaped like a <b>cube</b>." },
      { word: "sphere", phonetic: "/sfɪər/", kr: "구", cn: "球体 (qiú tǐ)", jp: "球 (きゅう)", ex: "A basketball is a perfectly round <b>sphere</b>." },
      { word: "cylinder", phonetic: "/ˈsɪlɪndər/", kr: "원기둥", cn: "圆柱体 (yuán zhù tǐ)", jp: "円柱 (えんちゅう)", ex: "A soup can is a <b>cylinder</b>." },
      { word: "cone", phonetic: "/koʊn/", kr: "원뿔", cn: "圆锥体 (yuán zhuī tǐ)", jp: "円錐 (えんすい)", ex: "An ice cream <b>cone</b> has a pointy bottom." },
      { word: "prism", phonetic: "/ˈprɪzəm/", kr: "기둥", cn: "棱柱 (léng zhù)", jp: "角柱 (かくちゅう)", ex: "A long box is a rectangular <b>prism</b>." },
      { word: "pyramid", phonetic: "/ˈpɪrəmɪd/", kr: "뿔, 피라미드", cn: "金字塔 (jīn zì tǎ)", jp: "角錐 (かくすい)", ex: "A <b>pyramid</b> has a flat base and a pointy top." },
      { word: "face", phonetic: "/feɪs/", kr: "면", cn: "面 (miàn)", jp: "面 (めん)", ex: "A cube has six flat <b>face</b>s." },
      { word: "edge", phonetic: "/ɛdʒ/", kr: "모서리", cn: "边 (biān)", jp: "辺 (へん)", ex: "An <b>edge</b> is where two flat faces meet." },

      // Models & Tools
      { word: "tape diagram", phonetic: "/teɪp ˈdaɪəɡræm/", kr: "테이프 다이어그램", cn: "带状图 (dài zhuàng tú)", jp: "テープ図 (てーぷず)", ex: "We draw a <b>tape diagram</b> to solve the puzzle." },
      { word: "bar diagram", phonetic: "/bɑːr ˈdaɪəɡræm/", kr: "막대 다이어그램", cn: "条形图 (tiáo xíng tú)", jp: "棒図 (ぼうず)", ex: "A <b>bar diagram</b> helps us see parts and a whole." },
      { word: "area model", phonetic: "/ˈɛəriə ˈmɒdl/", kr: "넓이 모델", cn: "面积模型 (miàn jī mó xíng)", jp: "面積モデル (めんせきもでる)", ex: "We use an <b>area model</b> to multiply big numbers." },
      { word: "array", phonetic: "/əˈreɪ/", kr: "배열", cn: "阵列 (zhèn liè)", jp: "配列 (はいれつ)", ex: "An <b>array</b> has neat rows and columns of dots." },
      { word: "rectangular array", phonetic: "/rɛkˈtæŋɡjʊlər əˈreɪ/", kr: "직사각형 배열", cn: "矩形阵列 (jù xíng zhèn liè)", jp: "長方形配列 (ちょうほうけいはいれつ)", ex: "A carton of eggs is a <b>rectangular array</b>." },
      { word: "rows", phonetic: "/roʊz/", kr: "행, 가로줄", cn: "行 (xíng)", jp: "行 (ぎょう)", ex: "The desks are arranged in straight <b>rows</b>." },
      { word: "columns", phonetic: "/ˈkɒləmz/", kr: "열, 세로줄", cn: "列 (liè)", jp: "列 (れつ)", ex: "<b>Columns</b> go straight up and down." },
      { word: "number bond", phonetic: "/ˈnʌmbər bɒnd/", kr: "수 가르기/모으기", cn: "数字键 (shù zì jiàn)", jp: "ナンバーボンド (なんばーぼんど)", ex: "A <b>number bond</b> shows how parts make a whole." },
      { word: "protractor", phonetic: "/proʊˈtræktər/", kr: "각도기", cn: "量角器 (liáng jiǎo qì)", jp: "分度器 (ふんどき)", ex: "Use a <b>protractor</b> to measure the angle." },
      { word: "ruler", phonetic: "/ˈruːlər/", kr: "자", cn: "尺子 (chǐ zi)", jp: "定規 (じょうぎ)", ex: "Use a <b>ruler</b> to draw a straight line." },
      { word: "compass", phonetic: "/ˈkʌmpəs/", kr: "컴퍼스", cn: "圆规 (yuán guī)", jp: "コンパス (こんぱす)", ex: "A <b>compass</b> helps you draw a perfect circle." }
    ];

    function App() {
      // Main progression states
      const [mainIndex, setMainIndex] = useState(0);
      const [highestMainIndex, setHighestMainIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      
      // Review session states (The 5X Loop)
      const [inReviewSession, setInReviewSession] = useState(false);
      const [reviewQueue, setReviewQueue] = useState([]);
      const [reviewIndex, setReviewIndex] = useState(0);

      // Determine which word is currently showing
      const currentList = inReviewSession ? reviewQueue : vocabData;
      const currentIndex = inReviewSession ? reviewIndex : mainIndex;
      const currentWord = currentList[currentIndex];

      const isDone = !inReviewSession && mainIndex >= vocabData.length;

      const playTTS = (e) => {
        e.stopPropagation();
        if ('speechSynthesis' in window) {
          const utterance = new SpeechSynthesisUtterance(currentWord.word);
          utterance.lang = 'en-US';
          utterance.rate = 0.85; 
          window.speechSynthesis.speak(utterance);
        } else {
          alert("TTS not supported.");
        }
      };

      const handleFlip = () => setIsFlipped(!isFlipped);

      const handlePrev = () => {
        setIsFlipped(false);
        if (inReviewSession) {
          setReviewIndex((prev) => (prev - 1 + reviewQueue.length) % reviewQueue.length);
        } else {
          setMainIndex((prev) => Math.max(0, prev - 1));
        }
      };

      const handleNext = () => {
        setIsFlipped(false);
        if (inReviewSession) {
          setReviewIndex((prev) => (prev + 1) % reviewQueue.length);
        } else {
          setMainIndex((prev) => Math.min(vocabData.length, prev + 1));
        }
      };

      const handleO = () => {
        setIsFlipped(false);
        if (inReviewSession) {
          // Remove from review queue when 'O' is clicked
          const newQueue = reviewQueue.filter((_, idx) => idx !== reviewIndex);
          setReviewQueue(newQueue);
          
          if (newQueue.length === 0) {
            setInReviewSession(false);
          } else {
            setReviewIndex((prev) => prev % newQueue.length);
          }
        } else {
          setHighestMainIndex((prev) => Math.max(prev, mainIndex + 1));
          setMainIndex((prev) => prev + 1);
        }
      };

      const handleX = () => {
        setIsFlipped(false);
        if (inReviewSession) {
          // Just move to the next review word if 'X' is clicked again
          setReviewIndex((prev) => (prev + 1) % reviewQueue.length);
        } else {
          setHighestMainIndex((prev) => Math.max(prev, mainIndex + 1));
          
          const newReviewQueue = [...reviewQueue, vocabData[mainIndex]];
          setReviewQueue(newReviewQueue);
          
          if (newReviewQueue.length === 5) {
            setInReviewSession(true);
            setReviewIndex(0);
            setMainIndex((prev) => prev + 1);
          } else {
            setMainIndex((prev) => prev + 1);
          }
        }
      };

      const handleRestart = () => {
        setMainIndex(0);
        setHighestMainIndex(0);
        setInReviewSession(false);
        setReviewQueue([]);
        setReviewIndex(0);
        setIsFlipped(false);
      };

      if (isDone) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
            <h1 className="text-4xl font-bold text-slate-800 mb-4">Great Job! 🎉</h1>
            <p className="text-lg text-slate-600 mb-8">You finished all the math vocabulary words.</p>
            <button 
              onClick={handleRestart}
              className="px-8 py-4 bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 font-bold"
            >
              Start Over
            </button>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col items-center py-10 px-4 sm:px-6">
          
          {/* Header & Status */}
          <div className="w-full max-w-2xl text-center mb-6">
            <h1 className="text-2xl font-bold text-slate-800 mb-2">Math Vocab Flashcards</h1>
            <p className="text-sm text-slate-500 mb-4 font-medium">
              Click the card to flip. Use 'O' or 'X' to proceed.
            </p>

            <div className={`p-4 rounded-xl shadow-sm border-2 flex flex-col sm:flex-row items-center justify-between gap-4 transition-colors ${inReviewSession ? 'bg-orange-50 border-orange-400' : 'bg-white border-slate-200'}`}>
              <div className="flex flex-col text-left">
                <span className={`font-bold text-lg ${inReviewSession ? 'text-orange-600' : 'text-slate-700'}`}>
                  {inReviewSession ? "Review Mode (5 Words)" : "Main Mode"}
                </span>
                <span className="text-xs text-slate-500">
                  {inReviewSession 
                    ? "Turn all 'X' into 'O' to continue."
                    : "Collect 5 'X' marks to trigger a review."}
                </span>
              </div>
              
              <div className="flex items-center gap-2">
                {!inReviewSession && (
                  <div className="flex gap-1">
                    {[...Array(5)].map((_, i) => (
                      <div 
                        key={i} 
                        className={`w-4 h-4 rounded-full border-2 ${i < reviewQueue.length ? 'bg-red-500 border-red-500' : 'bg-slate-100 border-slate-300'}`}
                      />
                    ))}
                  </div>
                )}
                {inReviewSession && (
                  <div className="text-orange-700 font-bold bg-orange-200 px-3 py-1 rounded-full text-sm">
                    {reviewQueue.length} words left
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="text-slate-500 font-medium mb-4 text-sm uppercase tracking-wider">
            {inReviewSession 
              ? `Review Card ${reviewIndex + 1} of ${reviewQueue.length}`
              : `Card ${mainIndex + 1} of ${vocabData.length}`}
          </div>

          {/* Flashcard (Instant Flip) */}
          <div 
            className="w-full max-w-2xl h-[420px] mb-8 cursor-pointer relative"
            onClick={handleFlip}
          >
            {!isFlipped ? (
              // FRONT
              <div className="absolute inset-0 bg-white rounded-3xl shadow-md border border-slate-200 flex flex-col items-center justify-center p-8 text-center">
                <button 
                  onClick={playTTS}
                  className="absolute top-6 right-6 p-3 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition shadow-sm"
                  title="Listen"
                >
                  <VolumeIcon />
                </button>
                <h2 className="text-5xl sm:text-6xl font-extrabold text-slate-800 mb-6 tracking-tight">
                  {currentWord.word}
                </h2>
                <p className="text-2xl text-slate-400 font-medium font-sans">
                  {currentWord.phonetic}
                </p>
                <div className="absolute bottom-6 text-slate-400 text-sm font-semibold">
                  Click to flip
                </div>
              </div>
            ) : (
              // BACK
              <div className="absolute inset-0 bg-white rounded-3xl shadow-md border border-slate-200 flex flex-col justify-center p-6 sm:p-10 text-left">
                
                <div className="flex flex-col gap-5 mb-6">
                  {/* Korean */}
                  <div className="flex items-center gap-4">
                    <span className="px-3 py-1 bg-blue-100 text-blue-700 font-bold rounded text-xs w-10 text-center">KR</span>
                    <span className="text-2xl font-bold text-blue-600">{currentWord.kr}</span>
                  </div>
                  
                  {/* Chinese */}
                  <div className="flex items-center gap-4">
                    <span className="px-3 py-1 bg-red-100 text-red-700 font-bold rounded text-xs w-10 text-center">CN</span>
                    <span className="text-2xl font-bold text-red-600">{currentWord.cn}</span>
                  </div>
                  
                  {/* Japanese */}
                  <div className="flex items-center gap-4">
                    <span className="px-3 py-1 bg-emerald-100 text-emerald-700 font-bold rounded text-xs w-10 text-center">JP</span>
                    <span className="text-2xl font-bold text-emerald-600">{currentWord.jp}</span>
                  </div>
                </div>

                <div className="w-full h-px bg-slate-200 my-4"></div>
                
                {/* Example Sentence */}
                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                  <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Example</span>
                  <p 
                    className="text-lg sm:text-xl text-slate-700 font-medium leading-relaxed"
                    dangerouslySetInnerHTML={{ __html: currentWord.ex }}
                  />
                </div>
                
                <div className="absolute bottom-6 left-0 right-0 text-center text-slate-400 text-sm font-semibold">
                  Click to flip back
                </div>
              </div>
            )}
          </div>

          {/* Controls */}
          <div className="w-full max-w-2xl flex items-center justify-between px-2">
            <button 
              onClick={handlePrev}
              disabled={currentIndex === 0 && !inReviewSession}
              className="flex items-center gap-2 px-5 py-3 text-slate-600 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed font-bold shadow-sm"
            >
              <ArrowLeft /> Prev
            </button>

            <div className="flex gap-4">
              <button 
                onClick={handleO}
                className="w-16 h-16 sm:w-20 sm:h-20 bg-green-500 border-b-4 border-green-600 text-white rounded-full flex items-center justify-center hover:bg-green-600 transition shadow-md active:border-b-0 active:translate-y-1"
                title="Know it"
              >
                <CircleIcon />
              </button>
              
              <button 
                onClick={handleX}
                className="w-16 h-16 sm:w-20 sm:h-20 bg-red-500 border-b-4 border-red-600 text-white rounded-full flex items-center justify-center hover:bg-red-600 transition shadow-md active:border-b-0 active:translate-y-1"
                title="Don't know it"
              >
                <XIcon />
              </button>
            </div>

            <button 
              onClick={handleNext}
              disabled={inReviewSession || mainIndex >= highestMainIndex}
              title={inReviewSession || mainIndex >= highestMainIndex ? "Press O or X to continue" : "Next card"}
              className="flex items-center gap-2 px-5 py-3 text-slate-600 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed font-bold shadow-sm"
            >
              Next <ArrowRight />
            </button>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
